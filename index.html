<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Landing Page</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container utama untuk membatasi tampilan mobile */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            overflow: hidden;
            /* Animasi transisi masuk saat halaman dimuat */
            animation: openingTransition 2.5s ease-in-out forwards;
        }

        /* Base layering untuk semua gambar */
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* --- PENGATURAN LAYERING (Z-INDEX) --- */

        /* Layer 1: Background Paling Belakang */
        .bg-utama { z-index: 1; }

        /* Layer 2: Rumah Adat */
        .rumah-adat { 
            z-index: 2; 
            object-fit: contain; 
            bottom: 10%; 
            height: auto; 
        }

        /* Layer 3: Konten Tengah (Logo & Tombol) */
        .content-middle {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto; /* Agar tombol bisa diklik */
        }

        /* Layer 4: Bunga-bunga di depan (Foreground) */
        .bunga { z-index: 15; object-fit: contain; }

        /* Layer 5: Bunga Utama Bawah & Kelopak (Paling Depan) */
        .bunga-depan { z-index: 20; object-fit: contain; }
        .kelopak-layer { z-index: 25; }

        /* --- POSISI SPESIFIK & UKURAN --- */
        .b-kiri-atas { top: 0; left: 0; width: 60%; }
        .b-kanan-atas { top: 0; right: 0; width: 60%; }
        .b-t-a-kiri { top: 2%; left: 15%; width: 35%; }
        .b-t-a-kanan { top: 2%; right: 15%; width: 35%; }
        .b-t-a-kecil { top: 15%; width: 100%; }

        .b-kiri-bawah { bottom: 0; left: 0; width: 50%; }
        .b-kanan-bawah { bottom: 0; right: 0; width: 50%; }
        .b-t-b-kiri { bottom: 2%; left: 10%; width: 40%; }
        .b-t-b-kanan { bottom: 2%; right: 10%; width: 40%; }
        
        /* Menutup bagian bawah rumah adat */
        .b-bawah-utama { bottom: -2%; width: 100%; }

        /* Styling Tombol */
        .logo-img {
            width: 60%;
            margin-bottom: 20px;
            /* Efek fade-in lembut untuk logo */
            animation: fadeInLogo 3s ease-in-out forwards;
        }

        .btn-buka {
            padding: 12px 30px;
            background-color: #8b5e34;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* --- ANIMASI --- */

        /* Animasi Transisi Masuk Halaman */
        @keyframes openingTransition {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInLogo {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Animasi Float (Naik Turun) */
        .float-anim {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Animasi Side Float (Kiri Kanan Halus) */
        .side-float {
            animation: sideMoving 6s ease-in-out infinite;
        }
        @keyframes sideMoving {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(12px); }
        }

        /* Animasi Kelopak Jatuh */
        .kelopak {
            position: absolute;
            width: 20px;
            animation: fall 8s linear infinite;
            opacity: 0;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="container">
        
        <img src="background.jpg" class="layer bg-utama" alt="Background">

        <img src="rumah_adat.png" class="layer rumah-adat" alt="Rumah Adat">

        <img src="bunga_kiri_atas.png" class="layer bunga b-kiri-atas float-anim">
        <img src="bunga_kanan_atas.png" class="layer bunga b-kanan-atas float-anim">
        <img src="bunga_tengah_atas_kiri.png" class="layer bunga b-t-a-kiri float-anim">
        <img src="bunga_tengah_atas_kanan.png" class="layer bunga b-t-a-kanan float-anim">
        <img src="bunga_tengah_atas_kecil.png" class="layer bunga b-t-a-kecil side-float">

        <div class="content-middle">
            <img src="logo.png" class="logo-img" alt="Logo">
            <button class="btn-buka">BUKA UNDANGAN</button>
        </div>

        <img src="bunga_kiri_bawah.png" class="layer bunga b-kiri-bawah float-anim">
        <img src="bunga_kanan_bawah.png" class="layer bunga b-kanan-bawah float-anim">
        <img src="bunga_tengah_bawah_kiri.png" class="layer bunga b-t-b-kiri float-anim">
        <img src="bunga_tengah_bawah_kanan.png" class="layer bunga b-t-b-kanan float-anim">
        
        <img src="bunga_tengah_bawah_utama.png" class="layer bunga-depan b-bawah-utama side-float">

        <img src="kelopak1.png" class="kelopak-layer kelopak" style="left: 20%; animation-delay: 0s;">
        <img src="kelopak2.png" class="kelopak-layer kelopak" style="left: 50%; animation-delay: 2s;">
        <img src="kelopak3.png" class="kelopak-layer kelopak" style="left: 80%; animation-delay: 4s;">

    </div>

</body>
</html>
