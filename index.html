<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background-color: #f4f4f4; 
        }

        /* Container utama: Simulasi layar HP Portrait */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 450px; /* Lebar maksimal layar HP */
            margin: 0 auto;
            overflow: hidden;
        }

        /* Base style untuk semua elemen */
        .layer {
            position: absolute;
            display: block;
            pointer-events: none;
        }

        /* 1. BACKGROUND (Paling Belakang) */
        .bg-utama {
            z-index: 1;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            object-fit: cover;
        }

        /* 2. RUMAH ADAT (Letakkan di bawah tapi jangan terlalu tenggelam) */
        .rumah-adat {
            z-index: 2;
            width: 85%;
            bottom: 12%;
            left: 7.5%;
        }

        /* 3. LOGO & TOMBOL (Z-index 5: Di belakang bunga, di depan rumah) */
        .center-content {
            position: absolute;
            z-index: 5;
            width: 100%;
            top: 22%; /* Menempatkan logo di area atas yang kosong */
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        .logo-img { width: 60%; margin-bottom: 25px; }

        .btn-buka {
            background-color: #9d6b3d;
            color: white;
            padding: 12px 35px;
            border-radius: 25px;
            border: none;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* 4. BUNGA FRAME ATAS (Z-index 10) */
        .b-kiri-atas { z-index: 10; top: -2%; left: -5%; width: 50%; }
        .b-kanan-atas { z-index: 10; top: -2%; right: -5%; width: 50%; }
        .b-t-a-kiri { z-index: 11; top: 0; left: 10%; width: 35%; }
        .b-t-a-kanan { z-index: 11; top: 0; right: 10%; width: 35%; }
        .b-t-a-kecil { z-index: 12; top: 8%; left: 0; width: 100%; }

        /* 5. BUNGA FRAME BAWAH (Z-index 15) */
        .b-kiri-bawah { z-index: 15; bottom: 5%; left: -5%; width: 40%; }
        .b-kanan-bawah { z-index: 15; bottom: 5%; right: -5%; width: 40%; }
        .b-t-b-kiri { z-index: 16; bottom: 0; left: 0; width: 45%; }
        .b-t-b-kanan { z-index: 16; bottom: 0; right: 0; width: 45%; }

        /* 6. BUNGA UTAMA BAWAH (Foreground Paling Depan - Z-index 20) */
        .b-bawah-utama {
            z-index: 20;
            bottom: -2%;
            left: 0;
            width: 100%; /* Penutup bagian bawah rumah adat */
        }

        /* --- ANIMASI --- */
        .float { animation: floatAnim 4s ease-in-out infinite; }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .side { animation: sideAnim 5s ease-in-out infinite; }
        @keyframes sideAnim {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }

        /* Kelopak Jatuh */
        .kelopak {
            position: absolute;
            z-index: 30;
            width: 18px;
            top: -20px;
            animation: falling 8s linear infinite;
        }

            0% { transform: translateY(0) rotate(0); opacity: 0; }
            10% { opacity: 0.
